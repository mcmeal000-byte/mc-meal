<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>MC Meal – Soda Sprint · Level 10</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<main class="page">
<section class="game-card">
<div class="topbar">
<div><h1>MC MEAL</h1><p>Soda Sprint · Level 10</p></div>
<div class="pill">Connected to Hub</div>
</div>
<canvas id="game" width="800" height="660"></canvas>
<div class="mobile-controls">
<div class="dpad">
<button data-key="ArrowLeft">◀</button>
<button data-key="ArrowRight">▶</button>
</div>
<button class="action" data-key="Space">FILL</button>
</div>
<div class="help"><strong>Controls:</strong> Arrow keys / A-D move nozzle. Hold Space/FILL to pour. Stop inside the green perfect zone.</div>
</section>
</main>
<script src="game.js?v=live-fix-v5-limits"></script>
</body>
</html>
